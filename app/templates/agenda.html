<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <title>Agenda Médica</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <link
      href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="agenda-page">
    <div class="agenda-container">
      <h1>Agenda Médica</h1>

      <button id="logout" class="logout-button">Sair</button>

      <input
        type="text"
        id="busca"
        placeholder="Buscar por CPF, paciente ou médico"
      />

      <p id="mensagem" class="mensagem" style="display: none"></p>

      <div id="tabela"></div>
    </div>

    <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>

    <script>
      const token = localStorage.getItem("token");

      if (!token) {
        alert("Usuário não autenticado");

        window.location.href = "/";
      }

      let dadosAgenda = [];

      let tabela = null;

      fetch("/agendamentos", {
        method: "GET",

        headers: {
          Authorization: "Bearer " + token,
        },
      })
        .then((response) => response.json())

        .then((data) => {
          if (data.erro) {
            mostrarMensagem(data.erro);

            return;
          }

          dadosAgenda = data;

          criarTabela(dadosAgenda);
        })

        .catch(() => {
          mostrarMensagem("Erro ao carregar agenda");
        });

      function mostrarMensagem(texto) {
        const mensagem = document.getElementById("mensagem");

        mensagem.innerText = texto;

        mensagem.style.display = "block";
      }

      function criarTabela(dados) {
        const mensagem = document.getElementById("mensagem");

        if (dados.length === 0) {
          mensagem.innerText = "Nenhum agendamento encontrado.";

          mensagem.style.display = "block";
        } else {
          mensagem.style.display = "none";
        }

        if (tabela) {
          tabela.setData(dados);

          return;
        }

        tabela = new Tabulator("#tabela", {
          data: dados,

          layout: "fitColumns",

          pagination: "local",

          paginationSize: 10,

          columns: [
            {
              title: "Data",
              field: "data",
            },

            {
              title: "Horário",
              field: "horario",
            },

            {
              title: "Paciente",
              field: "paciente",
            },

            {
              title: "CPF",
              field: "cpf",
            },

            {
              title: "Médico",
              field: "medico",
            },

            {
              title: "Especialidade",
              field: "especialidade",
            },

            {
              title: "Convênio",
              field: "convenio",
            },

            {
              title: "Status",
              field: "status",
            },
          ],
        });
      }

      document.getElementById("busca").addEventListener("keyup", function () {
        let valor = this.value.toLowerCase();

        let filtrados = dadosAgenda.filter(
          (item) =>
            (item.paciente || "").toLowerCase().includes(valor) ||
            (item.cpf || "").includes(valor) ||
            (item.medico || "").toLowerCase().includes(valor),
        );

        criarTabela(filtrados);
      });

      document.getElementById("logout").addEventListener("click", function () {
        localStorage.removeItem("token");

        window.location.href = "/";
      });
    </script>
  </body>
</html>
